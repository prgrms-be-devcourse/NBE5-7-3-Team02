spring:
  datasource:
#    url: jdbc:tc:mysql:8:///app
#    username: test
#    password: test
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb
    username: sa
    password:

  flyway:
    enabled: true
    clean-disabled: false
    locations: classpath:db/migration/test

  jpa:
    hibernate:
      ddl-auto: create

  config:
    import: optional:file:.env[.properties]

  security:
    oauth2:
      client:
        registration:
          github:
            client-name: GitHub
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - read:user
              - user:email
              - read:org

file:
  upload-dir: uploads/

custom:
  jwt:
    validation:
      access: ${JWT_ACCESS_EXP}
      refresh: ${JWT_REFRESH_EXP}
    redirection:
      base: http://localhost8080
    secrets:
      origin-key: ${JWT_ORIGIN_KEY}
      app-key: ${JWT_APP_KEY}