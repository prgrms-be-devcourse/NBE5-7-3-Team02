spring:
  application:
    name: NBE_5_7_2_02TEAM

  config:
    import: optional:file:.env[.properties]

  jackson:
    property-naming-strategy: SNAKE_CASE

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 100MB

  datasource:
    url: ${DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

  flyway:
    enabled: false

  security:
    oauth2:
      client:
        registration:
          github:
            client-name: GitHub
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - read:user
              - user:email
              - read:org

file:
  upload-dir: uploads/

custom:
  jwt:
    validation:
      access: ${JWT_ACCESS_EXP}
      refresh: ${JWT_REFRESH_EXP}
    redirection:
      base: ${REDIRECTION_BASE}
    secrets:
      origin-key: ${JWT_ORIGIN_KEY}
      app-key: ${JWT_APP_KEY}

management:
  endpoints:
    web:
      base-path: ${ACTUATOR_BASE_PATH}
---
spring:
  config:
    activate:
      on-profile: prod

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration/prod

  jpa:
    hibernate:
      ddl-auto: none

  security:
    user:
      name: ${PROM_NAME}
      password: ${PROM_PASSWORD}
      roles: PROMETHEUS

management:
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: ${ACTUATOR_BASE_PATH}
  endpoint:
    prometheus:
      access: unrestricted

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs
  default-consumes-media-type: application/json
  default-produces-media-type: application/json