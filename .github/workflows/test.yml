name: Test
on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ dev ]

concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      JWT_ACCESS_EXP: ${{ secrets.JWT_ACCESS_EXP }}
      JWT_REFRESH_EXP: ${{ secrets.JWT_REFRESH_EXP }}
      JWT_APP_KEY: ${{ secrets.JWT_APP_KEY }}
      JWT_ORIGIN_KEY: ${{ secrets.JWT_ORIGIN_KEY }}
      GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
      PROJECT_DIR: NBE_5_7_2_02TEAM
      ACTUATOR_BASE_PATH: ${{ secrets.ACTUATOR_BASE_PATH }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test
        working-directory: ${{ env.PROJECT_DIR }}

      - name: Upload test report
        if: always()

        uses: actions/upload-artifact@v4
        with:
          name: junit-test-report
          path: ${{ env.PROJECT_DIR }}/build/reports/tests/test
          include-hidden-files: true
